<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Design Career Path</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" type="text/css">
  <style>
    body {
      font-family: 'Lato', Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
    }

    .container-fluid {
      padding: 20px;
    }

    .quiz-wrapper {
      max-width: 800px;
      margin: 0;
    }

    .quiz-title {
      text-align: left;
      font-size: 16pt;
      color: #48A548;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-instructions {
      text-align: left;
      font-size: 12pt;
      margin-bottom: 20px;
    }

    .quiz-frame {
      border-radius: 20px;
      padding: 20px 15px;
      box-sizing: border-box;
      min-height: 220px;
    }

    .quiz-content-area {
      transition: opacity 0.4s ease;
      opacity: 1;
    }

    .quiz-content-area.fading-out {
      opacity: 0;
    }

    .quiz-question {
      font-size: 14pt;
      margin-bottom: 20px;
      color: #48A548;
      font-weight: 700;
    }

    .quiz-options {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      cursor: pointer;
      font-size: 12pt;
    }

    .quiz-option-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #48A548;
      margin-right: 10px;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      box-sizing: border-box;
    }

    .quiz-option:hover .quiz-option-circle {
      background-color: #5AC8DA;
      border-color: #5AC8DA;
    }

    .quiz-option-text {
      flex: 1;
    }

    .quiz-result-title {
      font-size: 16pt;
      color: #48A548;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .quiz-result-sentence {
      font-size: 12pt;
      margin-bottom: 16px;
    }

    .quiz-result-description {
      font-size: 12pt;
      max-width: 700px;
      margin-top: 10px;
    }

    .profile-buttons {
      margin-top: 10px;
      margin-bottom: 5px;
    }

    .profile-buttons span {
      display: inline-block;
      margin-bottom: 8px;
    }

    .profile-button {
      display: inline-block;
      margin-right: 8px;
      margin-bottom: 8px;
      padding: 6px 10px;
      border-radius: 14px;
      border: 1px solid #48A548;
      cursor: pointer;
      font-size: 11pt;
      background-color: #ffffff;
      color: #48A548;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .profile-button:hover {
      background-color: #5AC8DA;
      color: #ffffff;
      border-color: #5AC8DA;
    }

    .profile-button.highlighted {
      background-color: #48A548;
      color: #ffffff;
    }

    .profile-card {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #dddddd;
      background-color: #f9f9f9;
    }

    .profile-card.active {
      display: block;
    }

    .profile-card-title {
      font-weight: 700;
      color: #48A548;
      margin-bottom: 4px;
      font-size: 13pt;
    }

    h3, h2 {
      color: #48A548;
      font-family: 'Lato', Arial, sans-serif;
      text-align: left;
    }

    p {
      font-family: 'Lato', Arial, sans-serif;
      text-align: left;
    }

    .row::after {
      content: "";
      display: table;
      clear: both;
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="quiz-wrapper">
    <div class="row">
      <div class="col-xs-12">
        <div class="quiz-title">Design Career Path</div>
        <div class="quiz-instructions">
          Complete the following Design Career Path Quiz to inform your interests and persona as a graphic designer. It is a helpful place to start! This quiz has 6 questions. Click on the option that best fits you; each question will fade into the next one automatically.
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-xs-12">
        <div class="quiz-frame">
          <div id="quiz-content" class="quiz-content-area">
            <!-- First question injected by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-xs-12 col-sm-12 col-md-12 col-xs-12 top-space pg4-text">
    <div class="row strip-h">
      <div class="col-sm-4 col-xs-4"></div>
      <div class="col-sm-4 col-xs-4"></div>
      <div class="col-sm-4 col-xs-4"></div>
    </div>
  </div>
</div>

<p>
<script>
(function() {
  var questions = [
    {
      text: "1. When you start a new project, what excites you the most?",
      options: [
        { letter: "A", text: "a) Having full control to explore ideas freely." },
        { letter: "B", text: "b) Collaborating with a team to meet a clear goal." },
        { letter: "C", text: "c) Experimenting with new tools or technology." },
        { letter: "D", text: "d) Perfecting every detail until it feels timeless." }
      ]
    },
    {
      text: "2. How do you feel about working with clients?",
      options: [
        { letter: "A", text: "a) I like being selective and choosing who I work with." },
        { letter: "B", text: "b) I enjoy building long-term relationships with clients or companies." },
        { letter: "C", text: "c) I'd prefer to design for users, not big companies." },
        { letter: "D", text: "d) I love clients who appreciate craftsmanship and patience." }
      ]
    },
    {
      text: "3. What best describes your work style?",
      options: [
        { letter: "A", text: "a) Intuitive, spontaneous and flexible." },
        { letter: "B", text: "b) Structured, goal-oriented, and collaborative." },
        { letter: "C", text: "c) Analytical, experimental, and curious." },
        { letter: "D", text: "d) Focused, disciplined, and perfectionistic." }
      ]
    },
    {
      text: "4. How do you handle risk and stability?",
      options: [
        { letter: "A", text: "a) I'll take risks if it means creative freedom." },
        { letter: "B", text: "b) I like a steady salary with occasional challenges." },
        { letter: "C", text: "c) I don't mind uncertainty, innovation requires it." },
        { letter: "D", text: "d) I prefer predictable work where I can refine my expertise." }
      ]
    },
    {
      text: "5. What motivates you most as a designer?",
      options: [
        { letter: "A", text: "a) Independence and personal expression." },
        { letter: "B", text: "b) Team success and recognition." },
        { letter: "C", text: "c) Solving real problems through design." },
        { letter: "D", text: "d) Crafting something beautiful and lasting." }
      ]
    },
    {
      text: "6. Where do you picture yourself thriving in 5 years?",
      options: [
        { letter: "A", text: "a) Running my own creative studio or freelance business." },
        { letter: "B", text: "b) Working full-time at a branding or marketing agency." },
        { letter: "C", text: "c) Designing user experiences in tech or startups." },
        { letter: "D", text: "d) Creating for print, editorial or artisan-based industries." }
      ]
    }
  ];

  var profileText = {
    A: "Defining Traits: Visionary, Self-Directed, Adaptable, Expressive. You’re a natural-born creative with a strong sense of individuality and artistic direction. Independence and creative control are important to you. You prefer to shape your own workflow, choose your clients, and push boundaries through experimentation. Click the Next button to get the full profile details.",
    B: "Defining Traits: Organized, Collaborative, Goal-Oriented, Brand-Savvy. You excel in environments where creativity meets structure. You see design not just as an art form, but as a language for solving business and marketing challenges. Your strength lies in connecting visual storytelling with purpose and impact. Click the Next button to get the full profile details.",
    C: "Defining Traits: Curious, Analytical, Tech-Driven, Future-Focused. You’re energized by challenges that require experimentation and problem-solving. You thrive on innovation and aren’t afraid to try new methods, whether that’s in UX/UI, motion graphics, or interactive design. Click the Next button to get the full profile details.",
    D: "Defining Traits: Detail-oriented, Patient, Disciplined, Timeless. You value precision, beauty, and mastery in your work. You’re driven by craftsmanship, such as creating designs that feel enduring rather than trendy. You prefer quality over quantity and appreciate the tactile or traditional side of design, even as technology evolves. Click the Next button to get the full profile details."
  };

  var profileTitle = {
    A: "The Independent Creator",
    B: "The Strategic Designer",
    C: "The Innovator",
    D: "The Craftsperson"
  };

  var answers = [];
  var currentIndex = 0;
  var contentEl;

  function renderQuestion(index) {
    var q = questions[index];
    var html = '<div class="quiz-question">' + q.text + '</div>';
    html += '<ul class="quiz-options">';
    for (var i = 0; i < q.options.length; i++) {
      var opt = q.options[i];
      html += '<li class="quiz-option" data-answer="' + opt.letter + '">';
      html += '<div class="quiz-option-circle"></div>';
      html += '<div class="quiz-option-text">' + opt.text + '</div>';
      html += '</li>';
    }
    html += '</ul>';
    contentEl.innerHTML = html;

    var optionElements = contentEl.querySelectorAll('.quiz-option');
    for (var j = 0; j < optionElements.length; j++) {
      optionElements[j].addEventListener('click', onOptionClick);
    }
  }

  function renderResult() {
    var counts = { A: 0, B: 0, C: 0, D: 0 };
    for (var i = 0; i < answers.length; i++) {
      var a = answers[i];
      if (counts.hasOwnProperty(a)) counts[a]++;
    }

    var dominantLetters = [];
    var maxCount = 0;
    for (var key in counts) {
      if (counts.hasOwnProperty(key)) {
        if (counts[key] > maxCount) {
          maxCount = counts[key];
          dominantLetters = [key];
        } else if (counts[key] === maxCount && counts[key] > 0) {
          dominantLetters.push(key);
        }
      }
    }

    var exactThreeLetters = [];
    for (var letter in counts) {
      if (counts.hasOwnProperty(letter) && counts[letter] === 3) {
        exactThreeLetters.push(letter);
      }
    }

    var resultSentence = "";
    var likelyProfiles = [];

    if (exactThreeLetters.length === 1) {
      var ltr = exactThreeLetters[0];
      resultSentence = "You answered mostly " + ltr + "s. You are likely " + profileTitle[ltr] + ".";
      likelyProfiles = [ltr];
    } else {
      if (dominantLetters.length === 1) {
        var mainLetter = dominantLetters[0];
        resultSentence = "You answered mostly " + mainLetter + "s. You are likely " + profileTitle[mainLetter] + ".";
        likelyProfiles = [mainLetter];
      } else {
        var labelLetters = dominantLetters.slice();
        resultSentence = "You answered a mix of " + labelLetters.join(", ") + "s. You are likely a combination of profiles.";
        likelyProfiles = dominantLetters;
      }
    }

    var html = '<div class="quiz-result-title">Your Design Career Path</div>';
    html += '<div class="quiz-result-sentence">' + resultSentence + '</div>';

    html += '<div class="profile-buttons">';
    html += '<span>Click a profile below to read more:</span><br><br>';
    html += '<button type="button" class="profile-button" data-profile="A">The Independent Creator</button>';
    html += '<button type="button" class="profile-button" data-profile="B">The Strategic Designer</button>';
    html += '<button type="button" class="profile-button" data-profile="C">The Innovator</button>';
    html += '<button type="button" class="profile-button" data-profile="D">The Craftsperson</button>';
    html += '</div>';

    html += '<div id="profile-card-A" class="profile-card">';
    html += '<div class="profile-card-title">The Independent Creator</div>';
    html += '<p>' + profileText.A + '</p>';
    html += '</div>';

    html += '<div id="profile-card-B" class="profile-card">';
    html += '<div class="profile-card-title">The Strategic Designer</div>';
    html += '<p>' + profileText.B + '</p>';
    html += '</div>';

    html += '<div id="profile-card-C" class="profile-card">';
    html += '<div class="profile-card-title">The Innovator</div>';
    html += '<p>' + profileText.C + '</p>';
    html += '</div>';

    html += '<div id="profile-card-D" class="profile-card">';
    html += '<div class="profile-card-title">The Craftsperson</div>';
    html += '<p>' + profileText.D + '</p>';
    html += '</div>';

    contentEl.innerHTML = html;

    var buttons = contentEl.querySelectorAll('.profile-button');
    var cards = {
      A: document.getElementById('profile-card-A'),
      B: document.getElementById('profile-card-B'),
      C: document.getElementById('profile-card-C'),
      D: document.getElementById('profile-card-D')
    };

    function showProfile(letter) {
      for (var key in cards) {
        if (cards.hasOwnProperty(key)) {
          if (key === letter) {
            cards[key].classList.add('active');
          } else {
            cards[key].classList.remove('active');
          }
        }
      }
      for (var i = 0; i < buttons.length; i++) {
        var bLetter = buttons[i].getAttribute('data-profile');
        if (bLetter === letter) {
          buttons[i].classList.add('highlighted');
        } else {
          buttons[i].classList.remove('highlighted');
        }
      }
    }

    for (var i2 = 0; i2 < buttons.length; i2++) {
      buttons[i2].addEventListener('click', function() {
        var letter = this.getAttribute('data-profile');
        showProfile(letter);
      });
    }

    if (likelyProfiles.length && likelyProfiles[0]) {
      showProfile(likelyProfiles[0]);
    }
  }

  function onOptionClick(event) {
    var option = event.currentTarget;
    var answer = option.getAttribute('data-answer');
    answers[currentIndex] = answer;

    contentEl.classList.add('fading-out');
    setTimeout(function() {
      contentEl.classList.remove('fading-out');
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion(currentIndex);
      } else {
        renderResult();
      }
    }, 400);
  }

  function initQuiz() {
    contentEl = document.getElementById('quiz-content');
    renderQuestion(0);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initQuiz);
  } else {
    initQuiz();
  }
})();
</script>
</p>
<p>
<script>
// Empty: keeping file self-contained.
</script>
</p>
</body>
</html>
