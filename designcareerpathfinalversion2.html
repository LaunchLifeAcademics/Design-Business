<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Design Career Path</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" type="text/css">
  <style>
    body {
      font-family: 'Lato', Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
    }

    .container-fluid {
      padding: 20px;
    }

    .quiz-wrapper {
      max-width: 800px;
      margin: 0;
    }

    .quiz-title {
      text-align: left;
      font-size: 16pt;
      color: #48A548;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .quiz-instructions {
      text-align: left;
      font-size: 12pt;
      margin-bottom: 20px;
    }

    .quiz-frame {
      border-radius: 20px;
      padding: 20px 15px;
      box-sizing: border-box;
      min-height: 220px;
    }

    .quiz-content-area {
      transition: opacity 0.4s ease;
      opacity: 1;
    }

    .quiz-content-area.fading-out {
      opacity: 0;
    }

    .quiz-question {
      font-size: 14pt;
      margin-bottom: 20px;
      color: #48A548;
      font-weight: 700;
    }

    .quiz-options {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      cursor: pointer;
      font-size: 12pt;
    }

    .quiz-option-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #48A548;
      margin-right: 10px;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      box-sizing: border-box;
    }

    .quiz-option:hover .quiz-option-circle {
      background-color: #5AC8DA;
      border-color: #5AC8DA;
    }

    .quiz-option-text {
      flex: 1;
    }

    .quiz-result-title {
      font-size: 16pt;
      color: #48A548;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .quiz-result-sentence {
      font-size: 12pt;
      margin-bottom: 20px;
    }

    .quiz-result-description {
      font-size: 12pt;
      max-width: 700px;
      margin-top: 15px;
    }

    /* Profile buttons and cards */
    .profile-buttons {
      margin-top: 10px;
      margin-bottom: 5px;
    }

    .profile-button {
      display: inline-block;
      margin-right: 8px;
      margin-bottom: 8px;
      padding: 8px 12px;
      border-radius: 16px;
      border: 1px solid #48A548;
      cursor: pointer;
      font-size: 11pt;
      background-color: #ffffff;
      color: #48A548;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .profile-button:hover {
      background-color: #5AC8DA;
      color: #ffffff;
      border-color: #5AC8DA;
    }

    .profile-button.highlighted {
      background-color: #48A548;
      color: #ffffff;
    }

    .profile-card {
      display: none;
      margin-top: 15px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #dddddd;
      background-color: #f9f9f9;
    }

    .profile-card.active {
      display: block;
    }

    .profile-card-title {
      font-weight: 700;
      color: #48A548;
      margin-bottom: 4px;
      font-size: 13pt;
    }

    .profile-card-subtitle {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 11pt;
    }

    .profile-card img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 10px;
      display: block;
    }

    .profile-section-label {
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    ul.profile-list {
      padding-left: 18px;
      margin-top: 2px;
      margin-bottom: 6px;
    }

    h3, h2 {
      color: #48A548;
      font-family: 'Lato', Arial, sans-serif;
      text-align: left;
    }

    p {
      font-family: 'Lato', Arial, sans-serif;
      text-align: left;
    }

    .row::after {
      content: "";
      display: table;
      clear: both;
    }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="quiz-wrapper">
    <div class="row">
      <div class="col-xs-12">
        <div class="quiz-title">Design Career Path</div>
        <div class="quiz-instructions">
          Complete the following Design Career Path Quiz to inform your interests and persona as a graphic designer. It is a helpful place to start! This quiz has 6 questions. Click on the option that best fits you; each question will fade into the next one automatically.
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-xs-12">
        <div class="quiz-frame">
          <div id="quiz-content" class="quiz-content-area">
            <!-- First question injected by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Horizontal stripe kept for layout consistency (empty) -->
  <div class="col-xs-12 col-sm-12 col-md-12 col-xs-12 top-space pg4-text">
    <div class="row strip-h">
      <div class="col-sm-4 col-xs-4"></div>
      <div class="col-sm-4 col-xs-4"></div>
      <div class="col-sm-4 col-xs-4"></div>
    </div>
  </div>
</div>

<p>
<script>
(function() {
  var questions = [
    {
      text: "1. When you start a new project, what excites you the most?",
      options: [
        { letter: "A", text: "a) Having full control to explore ideas freely." },
        { letter: "B", text: "b) Collaborating with a team to meet a clear goal." },
        { letter: "C", text: "c) Experimenting with new tools or technology." },
        { letter: "D", text: "d) Perfecting every detail until it feels timeless." }
      ]
    },
    {
      text: "2. How do you feel about working with clients?",
      options: [
        { letter: "A", text: "a) I like being selective and choosing who I work with." },
        { letter: "B", text: "b) I enjoy building long-term relationships with clients or companies." },
        { letter: "C", text: "c) I'd prefer to design for users, not big companies." },
        { letter: "D", text: "d) I love clients who appreciate craftsmanship and patience." }
      ]
    },
    {
      text: "3. What best describes your work style?",
      options: [
        { letter: "A", text: "a) Intuitive, spontaneous and flexible." },
        { letter: "B", text: "b) Structured, goal-oriented, and collaborative." },
        { letter: "C", text: "c) Analytical, experimental, and curious." },
        { letter: "D", text: "d) Focused, disciplined, and perfectionistic." }
      ]
    },
    {
      text: "4. How do you handle risk and stability?",
      options: [
        { letter: "A", text: "a) I'll take risks if it means creative freedom." },
        { letter: "B", text: "b) I like a steady salary with occasional challenges." },
        { letter: "C", text: "c) I don't mind uncertainty, innovation requires it." },
        { letter: "D", text: "d) I prefer predictable work where I can refine my expertise." }
      ]
    },
    {
      text: "5. What motivates you most as a designer?",
      options: [
        { letter: "A", text: "a) Independence and personal expression." },
        { letter: "B", text: "b) Team success and recognition." },
        { letter: "C", text: "c) Solving real problems through design." },
        { letter: "D", text: "d) Crafting something beautiful and lasting." }
      ]
    },
    {
      text: "6. Where do you picture yourself thriving in 5 years?",
      options: [
        { letter: "A", text: "a) Running my own creative studio or freelance business." },
        { letter: "B", text: "b) Working full-time at a branding or marketing agency." },
        { letter: "C", text: "c) Designing user experiences in tech or startups." },
        { letter: "D", text: "d) Creating for print, editorial or artisan-based industries." }
      ]
    }
  ];

  var profileText = {
    A: {
      title: "The Independent Creator",
      traits: "Defining Traits: Visionary, Self-Directed, Adaptable, Expressive.",
      intro: "You’re a natural-born creative with a strong sense of individuality and artistic direction. You thrive when you have the freedom to explore your own ideas and work on projects that align with your values or interests. Independence and creative control are important to you. You prefer to shape your own workflow, choose your clients, and push boundaries through experimentation.",
      strengths: [
        "Strong personal style and creative intuition.",
        "Entrepreneurial mindset: confident in self-promotion and brand-building."
      ],
      challenges: [
        "Balancing creativity with structure and deadlines.",
        "Managing business or administrative tasks as a freelancer."
      ],
      paths: "Best-Fit Paths: Freelance Designer, Creative Entrepreneur, Jewelry or Product Designer, Artist/Founder, Illustrator.",
      tip: "Designer Tip: Focus on refining your personal brand, pricing strategies, and client communication skills. Your independence is your greatest asset when paired with professionalism.",
      imageAlt: "Independent creator working in a bright studio with sketchbooks and a laptop."
    },
    B: {
      title: "The Strategic Designer",
      traits: "Defining Traits: Organized, Collaborative, Goal-Oriented, Brand-Savvy.",
      intro: "You excel in environments where creativity meets structure. You enjoy working within teams, communicating ideas clearly, and developing designs that serve a larger strategy. You see design not just as an art form, but as a language for solving business and marketing challenges. Your strength lies in connecting visual storytelling with purpose and impact.",
      strengths: [
        "Strong understanding of branding, communication and teamwork.",
        "Strategic thinker who can align design with business goals.",
        "Excellent collaborator and communicator."
      ],
      challenges: [
        "Can become overly focused on approval or client direction.",
        "Risk of losing personal creative voice in corporate settings."
      ],
      paths: "Best-Fit Paths: Brand Designer, Marketing Designer, Art Director, Agency Creative, Communication Designer.",
      tip: "Designer Tip: Continue developing leadership, project management, and presentation skills. These will help you advance into senior or art director roles where strategy and creativity intersect.",
      imageAlt: "Strategic designer presenting brand concepts to a small team in a meeting room."
    },
    C: {
      title: "The Innovator",
      traits: "Defining Traits: Curious, Analytical, Tech-Driven, Future-Focused.",
      intro: "You’re energized by challenges that require experimentation and problem-solving. You enjoy exploring new tools, platforms, and technologies to create meaningful user experiences. You thrive on innovation and aren’t afraid to try new methods, whether that’s in UX/UI, motion graphics, or interactive design. You see design as a bridge between people and technology.",
      strengths: [
        "Technically skilled and quick to learn new tools.",
        "Strong conceptual and user-centred thinking.",
        "Comfortable with ambiguity and constant change."
      ],
      challenges: [
        "May overlook visual polish or emotional storytelling.",
        "Risk of burnout in fast-paced tech environments."
      ],
      paths: "Best-Fit Paths: UX/UI Designer, Product Designer, Motion Graphics Designer, Digital Strategist, Design Technologist.",
      tip: "Design Tip: Balance your analytical mindset with emotional storytelling. Innovation is most impactful when it connects with human experience.",
      imageAlt: "Innovative designer working on interface mockups and prototypes on multiple screens."
    },
    D: {
      title: "The Craftsperson",
      traits: "Defining Traits: Detail-Oriented, Patient, Disciplined, Timeless.",
      intro: "You value precision, beauty, and mastery in your work. You’re driven by craftsmanship, such as creating designs that feel enduring rather than trendy. You find satisfaction in refining every detail and developing a distinct visual style. You prefer quality over quantity and appreciate the tactile or traditional side of design, even as technology evolves.",
      strengths: [
        "Exceptional attention to detail and visual harmony.",
        "Deep appreciation for tradition, heritage and aesthetics.",
        "Strong technical and production knowledge."
      ],
      challenges: [
        "May resist fast-paced digital trends or rapid iteration.",
        "Can struggle with perfectionism or over-editing."
      ],
      paths: "Best-Fit Paths: Print Designer, Editorial Designer, Illustrator, Jewelry or Product Designer, Typographer, Fashion Designer.",
      tip: "Design Tip: Lean into your craftsmanship but remain open to digital tools. Blending traditional skill with modern presentation will keep your work timeless and relevant.",
      imageAlt: "Craftsperson carefully arranging printed layouts and materials on a desk."
    }
  };

  var answers = [];
  var currentIndex = 0;
  var contentEl;

  function renderQuestion(index) {
    var q = questions[index];
    var html = '<div class="quiz-question">' + q.text + '</div>';
    html += '<ul class="quiz-options">';
    for (var i = 0; i < q.options.length; i++) {
      var opt = q.options[i];
      html += '<li class="quiz-option" data-answer="' + opt.letter + '">';
      html += '<div class="quiz-option-circle"></div>';
      html += '<div class="quiz-option-text">' + opt.text + '</div>';
      html += '</li>';
    }
    html += '</ul>';
    contentEl.innerHTML = html;

    var optionElements = contentEl.querySelectorAll('.quiz-option');
    for (var j = 0; j < optionElements.length; j++) {
      optionElements[j].addEventListener('click', onOptionClick);
    }
  }

  function renderResult() {
    var counts = { A: 0, B: 0, C: 0, D: 0 };
    for (var i = 0; i < answers.length; i++) {
      var a = answers[i];
      if (counts.hasOwnProperty(a)) counts[a]++;
    }

    var dominantLetters = [];
    var maxCount = 0;
    for (var key in counts) {
      if (counts.hasOwnProperty(key)) {
        if (counts[key] > maxCount) {
          maxCount = counts[key];
          dominantLetters = [key];
        } else if (counts[key] === maxCount && counts[key] > 0) {
          dominantLetters.push(key);
        }
      }
    }

    var exactThreeLetters = [];
    for (var letter in counts) {
      if (counts.hasOwnProperty(letter) && counts[letter] === 3) {
        exactThreeLetters.push(letter);
      }
    }

    var resultSentence = "";
    var likelyProfiles = [];

    if (exactThreeLetters.length === 1) {
      var ltr = exactThreeLetters[0];
      resultSentence = "You answered mostly " + ltr + "s. You are likely " + profileText[ltr].title + ".";
      likelyProfiles = [ltr];
    } else {
      if (dominantLetters.length === 1) {
        var mainLetter = dominantLetters[0];
        resultSentence = "You answered mostly " + mainLetter + "s. You are likely " + profileText[mainLetter].title + ".";
        likelyProfiles = [mainLetter];
      } else {
        // Combination
        var labelLetters = dominantLetters.slice();
        resultSentence = "You answered a mix of " + labelLetters.join(", ") + "s. You are likely a combination of profiles.";
        likelyProfiles = dominantLetters;
      }
    }

    var html = '<div class="quiz-result-title">Your Design Career Path</div>';
    html += '<div class="quiz-result-sentence">' + resultSentence + '</div>';

    // Profile buttons
    html += '<div class="profile-buttons">';
    html += '<span>Click a profile below to read more:</span><br>';
    html += '<button type="button" class="profile-button" data-profile="A">The Independent Creator</button>';
    html += '<button type="button" class="profile-button" data-profile="B">The Strategic Designer</button>';
    html += '<button type="button" class="profile-button" data-profile="C">The Innovator</button>';
    html += '<button type="button" class="profile-button" data-profile="D">The Craftsperson</button>';
    html += '</div>';

    // Profile cards
    html += '<div id="profile-card-A" class="profile-card">';
    html += '<div class="profile-card-title">The Independent Creator</div>';
    html += '<img src="https://images.pexels.com/photos/269077/pexels-photo-269077.jpeg?auto=compress&cs=tinysrgb&w=800" alt="' + profileText.A.imageAlt + '">';
    html += '<div class="profile-card-subtitle">' + profileText.A.traits + '</div>';
    html += '<p>' + profileText.A.intro + '</p>';
    html += '<div class="profile-section-label">Strengths:</div>';
    html += '<ul class="profile-list"><li>' + profileText.A.strengths[0] + '</li><li>' + profileText.A.strengths[1] + '</li></ul>';
    html += '<div class="profile-section-label">Challenges:</div>';
    html += '<ul class="profile-list"><li>' + profileText.A.challenges[0] + '</li><li>' + profileText.A.challenges[1] + '</li></ul>';
    html += '<p>' + profileText.A.paths + '</p>';
    html += '<p>' + profileText.A.tip + '</p>';
    html += '</div>';

    html += '<div id="profile-card-B" class="profile-card">';
    html += '<div class="profile-card-title">The Strategic Designer</div>';
    html += '<img src="https://images.pexels.com/photos/1181467/pexels-photo-1181467.jpeg?auto=compress&cs=tinysrgb&w=800" alt="' + profileText.B.imageAlt + '">';
    html += '<div class="profile-card-subtitle">' + profileText.B.traits + '</div>';
    html += '<p>' + profileText.B.intro + '</p>';
    html += '<div class="profile-section-label">Strengths:</div>';
    html += '<ul class="profile-list"><li>' + profileText.B.strengths[0] + '</li><li>' + profileText.B.strengths[1] + '</li><li>' + profileText.B.strengths[2] + '</li></ul>';
    html += '<div class="profile-section-label">Challenges:</div>';
    html += '<ul class="profile-list"><li>' + profileText.B.challenges[0] + '</li><li>' + profileText.B.challenges[1] + '</li></ul>';
    html += '<p>' + profileText.B.paths + '</p>';
    html += '<p>' + profileText.B.tip + '</p>';
    html += '</div>';

    html += '<div id="profile-card-C" class="profile-card">';
    html += '<div class="profile-card-title">The Innovator</div>';
    html += '<img src="https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?auto=compress&cs=tinysrgb&w=800" alt="' + profileText.C.imageAlt + '">';
    html += '<div class="profile-card-subtitle">' + profileText.C.traits + '</div>';
    html += '<p>' + profileText.C.intro + '</p>';
    html += '<div class="profile-section-label">Strengths:</div>';
    html += '<ul class="profile-list"><li>' + profileText.C.strengths[0] + '</li><li>' + profileText.C.strengths[1] + '</li><li>' + profileText.C.strengths[2] + '</li></ul>';
    html += '<div class="profile-section-label">Challenges:</div>';
    html += '<ul class="profile-list"><li>' + profileText.C.challenges[0] + '</li><li>' + profileText.C.challenges[1] + '</li></ul>';
    html += '<p>' + profileText.C.paths + '</p>';
    html += '<p>' + profileText.C.tip + '</p>';
    html += '</div>';

    html += '<div id="profile-card-D" class="profile-card">';
    html += '<div class="profile-card-title">The Craftsperson</div>';
    html += '<img src="https://images.pexels.com/photos/3965555/pexels-photo-3965555.jpeg?auto=compress&cs=tinysrgb&w=800" alt="' + profileText.D.imageAlt + '">';
    html += '<div class="profile-card-subtitle">' + profileText.D.traits + '</div>';
    html += '<p>' + profileText.D.intro + '</p>';
    html += '<div class="profile-section-label">Strengths:</div>';
    html += '<ul class="profile-list"><li>' + profileText.D.strengths[0] + '</li><li>' + profileText.D.strengths[1] + '</li><li>' + profileText.D.strengths[2] + '</li></ul>';
    html += '<div class="profile-section-label">Challenges:</div>';
    html += '<ul class="profile-list"><li>' + profileText.D.challenges[0] + '</li><li>' + profileText.D.challenges[1] + '</li></ul>';
    html += '<p>' + profileText.D.paths + '</p>';
    html += '<p>' + profileText.D.tip + '</p>';
    html += '</div>';

    contentEl.innerHTML = html;

    // Button behavior
    var buttons = contentEl.querySelectorAll('.profile-button');
    var cards = {
      A: document.getElementById('profile-card-A'),
      B: document.getElementById('profile-card-B'),
      C: document.getElementById('profile-card-C'),
      D: document.getElementById('profile-card-D')
    };

    function showProfile(letter) {
      for (var key in cards) {
        if (cards.hasOwnProperty(key)) {
          if (key === letter) {
            cards[key].classList.add('active');
          } else {
            cards[key].classList.remove('active');
          }
        }
      }
      for (var i = 0; i < buttons.length; i++) {
        var bLetter = buttons[i].getAttribute('data-profile');
        if (bLetter === letter) {
          buttons[i].classList.add('highlighted');
        } else {
          buttons[i].classList.remove('highlighted');
        }
      }
    }

    for (var i2 = 0; i2 < buttons.length; i2++) {
      buttons[i2].addEventListener('click', function(e) {
        var letter = this.getAttribute('data-profile');
        showProfile(letter);
      });
    }

    // Auto-open the most likely profile (or first of combination)
    if (dominantLetters.length && dominantLetters[0]) {
      showProfile(dominantLetters[0]);
    }
  }

  function onOptionClick(event) {
    var option = event.currentTarget;
    var answer = option.getAttribute('data-answer');
    answers[currentIndex] = answer;

    contentEl.classList.add('fading-out');
    setTimeout(function() {
      contentEl.classList.remove('fading-out');
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion(currentIndex);
      } else {
        renderResult();
      }
    }, 400);
  }

  function initQuiz() {
    contentEl = document.getElementById('quiz-content');
    renderQuestion(0);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initQuiz);
  } else {
    initQuiz();
  }
})();
</script>
</p>
<p>
<script>
// Empty: keeping file self-contained.
</script>
</p>
</body>
</html>
